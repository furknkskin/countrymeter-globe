<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>CountryMeter Globe v9</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/Cesium.js"></script>
  <link rel="stylesheet"
        href="https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/Widgets/widgets.css" />

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #06111f;
      font-family: Arial, sans-serif;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      font-size: 14px;
      pointer-events: none;
      z-index: 10;
    }

    #countryCard {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(20, 25, 31, 0.96);
      color: white;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
      z-index: 20;
    }

    #countryName { font-size: 16px; font-weight: 700; }
    #countryCode { margin-top: 3px; font-size: 12px; opacity: 0.68; }

    #hoverLabel {
      position: fixed;
      display: none;
      pointer-events: none;
      padding: 6px 9px;
      border-radius: 8px;
      background: rgba(15, 20, 25, 0.92);
      color: white;
      font-size: 12px;
      z-index: 30;
      transform: translate(10px, 10px);
    }

    .cesium-viewer-bottom { font-size: 10px; }
  </style>
</head>

<body>
  <div id="cesiumContainer"></div>
  <div id="loading">Ülke sınırları yükleniyor…</div>
  <div id="hoverLabel"></div>

  <div id="countryCard">
    <div id="countryName">Ülke</div>
    <div id="countryCode"></div>
  </div>

  <script>
    const OCEAN_COLOR = Cesium.Color.fromCssColorString("#176B87");
    const DEFAULT_COLOR = Cesium.Color.fromCssColorString("#68727C");
    const VISITED_COLOR = Cesium.Color.fromCssColorString("#20C05C");
    const HOVER_COLOR = Cesium.Color.fromCssColorString("#9AA6B2");
    const BORDER_COLOR = Cesium.Color.fromCssColorString("#E4E9ED");

    const urlParams = new URLSearchParams(window.location.search);
    const visitedCodes = new Set(
      (urlParams.get("visited") || "")
        .split(",")
        .map(code => code.trim().toUpperCase())
        .filter(Boolean)
    );

    const viewer = new Cesium.Viewer("cesiumContainer", {
      animation: false,
      timeline: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      fullscreenButton: false,
      infoBox: false,
      selectionIndicator: false,
      baseLayerPicker: false,
      baseLayer: false,
      terrainProvider: new Cesium.EllipsoidTerrainProvider(),
      requestRenderMode: false
    });

    viewer.imageryLayers.removeAll();
    viewer.scene.globe.baseColor = OCEAN_COLOR;
    viewer.scene.globe.enableLighting = false;
    viewer.scene.backgroundColor = Cesium.Color.fromCssColorString("#06111f");
    viewer.scene.moon.show = false;
    viewer.scene.fog.enabled = true;

    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(30, 25, 18000000)
    });

    let selectedEntity = null;
    let hoveredEntity = null;
    let autoRotate = true;
    let resumeTimer;

    function getProp(entity, names) {
      for (const name of names) {
        const prop = entity.properties && entity.properties[name];
        if (!prop) continue;
        const value = prop.getValue(Cesium.JulianDate.now());
        if (value !== undefined && value !== null && value !== "") return value;
      }
      return "";
    }

    function getCountryName(entity) {
      return String(getProp(entity, [
        "NAME_TR", "ADMIN", "NAME_LONG", "NAME",
        "name_tr", "admin", "name_long", "name"
      ]) || "Bilinmeyen ülke");
    }

    function getCodeCandidates(entity) {
      const values = [
        getProp(entity, ["ISO_A2", "iso_a2"]),
        getProp(entity, ["ADM0_A3", "adm0_a3"]),
        getProp(entity, ["ISO_A3", "iso_a3"]),
        getProp(entity, ["SOV_A3", "sov_a3"]),
        getProp(entity, ["GU_A3", "gu_a3"])
      ];

      return values
        .map(value => String(value || "").toUpperCase())
        .filter(value => value && value !== "-99");
    }

    function getCountryCode(entity) {
      return getCodeCandidates(entity)[0] || "";
    }

    function isVisited(entity) {
      const codes = getCodeCandidates(entity);

  console.log(
    getCountryName(entity),
    codes,
    codes.some(code => visitedCodes.has(code))
  );

  return codes.some(code => visitedCodes.has(code));
}

    function setMaterial(entity, color) {
      entity.polygon.fill = true;
      entity.polygon.material = color;
    }

    function applyEntityStyle(entity) {
      if (!entity || !entity.polygon) return;

      setMaterial(entity, isVisited(entity) ? VISITED_COLOR : DEFAULT_COLOR);
      entity.polygon.outline = true;
      entity.polygon.outlineColor = BORDER_COLOR;
      entity.polygon.outlineWidth = 1.5;
    }

    const countriesUrl =
      "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson";

    Cesium.GeoJsonDataSource.load(countriesUrl, {
      clampToGround: false
    }).then((dataSource) => {
      viewer.dataSources.add(dataSource);

      for (const entity of dataSource.entities.values) {
        if (!entity.polygon) continue;

        applyEntityStyle(entity);
      }

      document.getElementById("loading").style.display = "none";
    }).catch((error) => {
      console.error("GeoJSON yükleme hatası:", error);
      document.getElementById("loading").textContent =
        "Ülke sınırları yüklenemedi.";
    });

    function pauseAutoRotate() {
      autoRotate = false;
      clearTimeout(resumeTimer);
      resumeTimer = setTimeout(() => autoRotate = true, 4000);
    }

    const canvas = viewer.scene.canvas;
    ["pointerdown", "wheel", "touchstart"].forEach((eventName) => {
      canvas.addEventListener(eventName, pauseAutoRotate, { passive: true });
    });

    viewer.clock.onTick.addEventListener(() => {
      if (autoRotate) {
        viewer.scene.camera.rotate(Cesium.Cartesian3.UNIT_Z, -0.00035);
      }
    });

    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    const hoverLabel = document.getElementById("hoverLabel");
    const countryCard = document.getElementById("countryCard");
    const countryName = document.getElementById("countryName");
    const countryCode = document.getElementById("countryCode");

    handler.setInputAction((movement) => {
      const picked = viewer.scene.pick(movement.endPosition);
      const entity = Cesium.defined(picked) ? picked.id : null;

      if (hoveredEntity && hoveredEntity !== selectedEntity) {
        applyEntityStyle(hoveredEntity);
      }

      hoveredEntity = entity && entity.polygon ? entity : null;

      if (hoveredEntity && hoveredEntity !== selectedEntity) {
        setMaterial(hoveredEntity, HOVER_COLOR);
        hoverLabel.textContent = getCountryName(hoveredEntity);
        hoverLabel.style.display = "block";
        hoverLabel.style.left = movement.endPosition.x + "px";
        hoverLabel.style.top = movement.endPosition.y + "px";
      } else {
        hoverLabel.style.display = "none";
      }
    }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

    handler.setInputAction((click) => {
      const picked = viewer.scene.pick(click.position);
      const entity = Cesium.defined(picked) ? picked.id : null;

      if (!entity || !entity.polygon) {
        countryCard.style.display = "none";
        selectedEntity = null;
        return;
      }

      if (selectedEntity && selectedEntity !== entity) {
        applyEntityStyle(selectedEntity);
      }

      selectedEntity = entity;
      countryName.textContent = getCountryName(entity);
      countryCode.textContent = getCountryCode(entity);
      countryCard.style.display = "block";
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
  </script>
</body>
</html>
