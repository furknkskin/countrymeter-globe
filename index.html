<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>CountryMeter Globe</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/Cesium.js"></script>
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/Widgets/widgets.css" />

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #090d18;
    }

    .cesium-viewer-bottom {
      font-size: 10px;
    }
  </style>
</head>

<body>
  <div id="cesiumContainer"></div>

  <script>
    const viewer = new Cesium.Viewer("cesiumContainer", {
      animation: false,
      timeline: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      fullscreenButton: false,
      infoBox: false,
      selectionIndicator: false,
      baseLayerPicker: false,
      baseLayer: false,
      terrainProvider: new Cesium.EllipsoidTerrainProvider(),
      requestRenderMode: false
    });

    viewer.imageryLayers.addImageryProvider(
      new Cesium.OpenStreetMapImageryProvider({
        url: "https://tile.openstreetmap.org/"
      })
    );

    viewer.scene.globe.enableLighting = true;
    viewer.scene.backgroundColor = Cesium.Color.fromCssColorString("#090d18");
    viewer.scene.moon.show = false;
    viewer.scene.fog.enabled = true;

    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(30, 25, 18000000)
    });

    let autoRotate = true;
    let resumeTimer;

    function pauseAutoRotate() {
      autoRotate = false;
      clearTimeout(resumeTimer);
      resumeTimer = setTimeout(() => {
        autoRotate = true;
      }, 4000);
    }

    const canvas = viewer.scene.canvas;
    ["pointerdown", "wheel", "touchstart"].forEach((eventName) => {
      canvas.addEventListener(eventName, pauseAutoRotate, { passive: true });
    });

    viewer.clock.onTick.addEventListener(() => {
      if (autoRotate) {
        viewer.scene.camera.rotate(Cesium.Cartesian3.UNIT_Z, -0.00035);
      }
    });
  </script>
</body>
</html>
