<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>CountryMeter Globe</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/Cesium.js"></script>
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.143/Build/Cesium/Widgets/widgets.css" />
  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #070a12;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      font: 14px Arial, sans-serif;
      pointer-events: none;
      z-index: 10;
    }
    .cesium-viewer-bottom { font-size: 10px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="loading">Ülke sınırları yükleniyor…</div>

  <script>
    const viewer = new Cesium.Viewer("cesiumContainer", {
      animation: false,
      timeline: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      fullscreenButton: false,
      infoBox: false,
      selectionIndicator: false,
      baseLayerPicker: false,
      baseLayer: false,
      terrainProvider: new Cesium.EllipsoidTerrainProvider(),
      requestRenderMode: false
    });

    viewer.imageryLayers.removeAll();

    viewer.scene.globe.baseColor =
      Cesium.Color.fromCssColorString("#1e252c");
    viewer.scene.globe.enableLighting = false;
    viewer.scene.backgroundColor =
      Cesium.Color.fromCssColorString("#070a12");
    viewer.scene.moon.show = false;
    viewer.scene.fog.enabled = true;

    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(30, 25, 18000000)
    });

    const countriesUrl =
      "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson";

    Cesium.GeoJsonDataSource.load(countriesUrl, {
      clampToGround: false
    }).then((dataSource) => {
      viewer.dataSources.add(dataSource);

      const now = Cesium.JulianDate.now();

      for (const entity of dataSource.entities.values) {
        if (!entity.polygon) continue;

        // Polygonu küre yüzeyinin biraz üstüne kaldır.
        // Bu, imagery katmanı yokken oluşabilen z-fighting/gizlenme sorununu önler.
        entity.polygon.height = 15000;
        entity.polygon.material =
          Cesium.Color.fromCssColorString("#59636c").withAlpha(1.0);
        entity.polygon.outline = true;
        entity.polygon.outlineColor =
          Cesium.Color.fromCssColorString("#c3cbd2");
        entity.polygon.outlineWidth = 1.5;
        entity.polygon.closeTop = true;
        entity.polygon.closeBottom = true;
      }

      document.getElementById("loading").style.display = "none";
    }).catch((error) => {
      console.error("GeoJSON yükleme hatası:", error);
      document.getElementById("loading").textContent =
        "Ülke sınırları yüklenemedi.";
    });

    let autoRotate = true;
    let resumeTimer;

    function pauseAutoRotate() {
      autoRotate = false;
      clearTimeout(resumeTimer);
      resumeTimer = setTimeout(() => {
        autoRotate = true;
      }, 4000);
    }

    const canvas = viewer.scene.canvas;
    ["pointerdown", "wheel", "touchstart"].forEach((eventName) => {
      canvas.addEventListener(eventName, pauseAutoRotate, { passive: true });
    });

    viewer.clock.onTick.addEventListener(() => {
      if (autoRotate) {
        viewer.scene.camera.rotate(Cesium.Cartesian3.UNIT_Z, -0.00035);
      }
    });
  </script>
</body>
</html>
